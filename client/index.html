<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <title>MetricBase World — Solana MMO · Build. Trade. Explore. Thrive Together!</title>
    <meta
      name="description"
      content="A browser-based Solana MMO and real-life economic simulation powered by the $BASE token. Gather, mine, farm, craft, fight, build your own World, and trade in a living chibi economy — live player stats at /stats."
    />
    <link rel="icon" type="image/png" href="/metricbase-world.png" />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MetricBase World" />
    <meta property="og:title" content="MetricBase World — Solana MMO &amp; living economy ($BASE)" />
    <meta
      property="og:description"
      content="Build. Trade. Explore. Thrive Together! Gather, mine, farm, craft, build a home, and trade in a living chibi world."
    />
    <meta property="og:url" content="https://world.metricbase.org" />
    <meta property="og:image" content="https://world.metricbase.org/metricbase-world.png" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="338" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MetricBase World — A real-life economic simulation MMO" />
    <meta
      name="twitter:description"
      content="Build. Trade. Explore. Thrive Together! Gather, mine, farm, craft, build a home, and trade."
    />
    <meta name="twitter:image" content="https://world.metricbase.org/metricbase-world.png" />

    <!-- Structured data for game-discovery crawlers (solgames.buzz etc.) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "MetricBase World",
      "url": "https://world.metricbase.org",
      "image": "https://world.metricbase.org/metricbase-world.png",
      "description": "Browser-based Solana MMO and living economic simulation powered by the $BASE token (mint DN2PNrZ8Jn65ioJw4QBwXv49j5JiBBL3wPLUDZcrpump). Gather, craft, fight, farm, build player-owned Worlds, and trade in a fully transparent on-chain economy.",
      "genre": ["MMO", "Simulation", "Economy", "Web3"],
      "gamePlatform": "Web Browser",
      "operatingSystem": "Any (browser-based, desktop and mobile)",
      "applicationCategory": "Game",
      "playMode": "MultiPlayer",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "sameAs": ["https://world.metricbase.org/stats", "https://world.metricbase.org/docs"]
    }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #b8e8fc;
        font-family: "Nunito", system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
